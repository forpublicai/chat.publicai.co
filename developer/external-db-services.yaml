apiVersion: v1
kind: Namespace
metadata:
  name: web-services
---
apiVersion: v1
kind: Service
metadata:
  name: external-postgres
  namespace: web-services
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-postgres
  namespace: web-services
subsets:
  - addresses:
      - ip: 10.244.0.1
    ports:
      - name: postgres
        port: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: external-redis
  namespace: web-services
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-redis
  namespace: web-services
subsets:
  - addresses:
      - ip: 10.244.0.1
    ports:
      - name: redis
        port: 6379
